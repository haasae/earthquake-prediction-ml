dataset:
  raw_path: data/raw/earthquakes.csv

training:
  target: Mag
  test_size: 0.2
  random_state: 42

model:
  type: random_forest
  random_forest:
    n_estimators: 300
    max_depth: null
    min_samples_split: 2

tuning:
  enabled: true
  cv_folds: 5
  n_iter: 20
  n_jobs: 2

artifacts:
  model_path: models/model.joblib
  preprocessor_path: models/preprocessor.joblib
  metrics_path: reports/metrics.json
  figures_dir: reports/figures
